<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input 7 số</title>

<style>
  body {
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  margin-top: 80px;
  background: linear-gradient(135deg, #1e1e2f, #2a2a40);
  color: #fff;
}

/* Tiêu đề */
h3 {
  margin-bottom: 25px;
  letter-spacing: 1px;
  opacity: 0.9;
}

/* Container 7 ô */
.boxes {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 25px;
}

/* Ô số */
.box {
  width: 50px;
  height: 60px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.08);
  border: 2px solid rgba(255,255,255,0.15);
  font-size: 28px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;

  backdrop-filter: blur(6px);
  box-shadow: 
    0 4px 15px rgba(0,0,0,0.3),
    inset 0 0 10px rgba(255,255,255,0.05);

  transition: all 0.2s ease;
}

/* Hiệu ứng khi có số */
.box:not(:empty) {
  border-color: #00d4ff;
  box-shadow: 
    0 0 12px rgba(0,212,255,0.6),
    inset 0 0 8px rgba(0,212,255,0.3);
  transform: translateY(-3px);
}

/* Input ẩn nhưng vẫn dùng */
input {
  opacity: 0;
  position: absolute;
  pointer-events: none;
}

/* Kết quả */
#result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
  min-height: 24px;
  transition: all 0.3s ease;
}

/* Khi đúng */
#result:contains("Khớp") {
  color: #00ffae;
}

/* Khi sai */
#result:contains("Không") {
  color: #ff4d6d;
}
</style>
</head>

<body>

<h3>Nhập 7 chữ số</h3>

<div class="boxes">
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
</div>

<!-- Ô nhập thật -->
<input 
  type="tel" 
  id="hiddenInput" 
  inputmode="numeric" 
  pattern="[0-9]*" 
  placeholder="Nhập số..." 
  autocomplete="off"
/>

<p id="result"></p>

<script>
  const CONST_A = "1234567";
  const CONST_B = "7654321";

  const input = document.getElementById("hiddenInput");
  const boxes = document.querySelectorAll(".box");
  const result = document.getElementById("result");

  let data = [];

  // Auto focus khi load
  window.addEventListener("load", () => {
    input.focus();
  });

  // Luôn giữ focus (click đâu cũng quay lại)
  document.addEventListener("click", () => {
    input.focus();
  });

  input.addEventListener("input", (e) => {
    let value = e.target.value.replace(/[^0-9]/g, "");

    if (!value) return;

    for (let char of value) {
      if (data.length >= 7) data.shift(); // dịch trái
      data.push(char);
    }

    e.target.value = "";

    updateDisplay();
  });

  function updateDisplay() {
    boxes.forEach((box, i) => {
      box.textContent = data[i] || "";
    });

    if (data.length === 7) {
      let inputStr = data.join("");

      if (inputStr === CONST_A) {
        result.textContent = "Khớp CONST_A";
      } else if (inputStr === CONST_B) {
        result.textContent = "Khớp CONST_B";
      } else {
        result.textContent = "Không khớp";
      }
    } else {
      result.textContent = "";
    }
  }
</script>

</body>
</html>
